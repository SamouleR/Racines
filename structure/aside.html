	<style>
aside {
    position: fixed;
    display: flex;
    flex-direction: column;
    left: 40px;
    top: 15%;
    margin: 0;
    padding: 0;
    z-index: 100;
    pointer-events: auto;
}

aside > table {
    margin: 0;
    padding: 0;
    border-collapse: separate;
    border-spacing: 0 25px;
}

aside > table > tbody > tr > td {
    margin: 0;
    padding: 0;
    position: relative;
    height: 100px;
}

aside > table > tbody > tr > td > .blob-container {
    position: relative;
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
}

aside > table > tbody > tr > td > .blob-container > .blob {
    position: absolute;
    width: 80px;
    height: 80px;
    background: #bc163a;
    border-radius: 50%;
    z-index: 1;
    filter: blur(2px);
    opacity: 0.9;
    animation: blob-animation 10s infinite alternate;
}

aside > table > tbody > tr > td > .blob-container > a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    transition: all 0.3s ease;
    text-decoration: none;
}

aside > table > tbody > tr > td > .blob-container > a > svg {
    width: 45px;
    height: 45px;
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 0 3px rgba(0,0,0,0.3));
    transition: transform 0.3s ease;
}

/* Effets de survol */
aside > table > tbody > tr > td > .blob-container > a:hover {
    transform: scale(1.1);
}

aside > table > tbody > tr > td > .blob-container > a:hover > svg {
    color: black;
}

/* Changement de couleur du blob au survol */
aside > table > tbody > tr > td > .blob-container:hover > .blob {
    background: #d42d4a;
    opacity: 1;
}

/* Animation des blobs */
@keyframes blob-animation {
    0% {
        border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        transform: scale(1) rotate(0deg);
    }
    25% {
        border-radius: 53% 47% 32% 68% / 38% 55% 45% 62%;
        transform: scale(1.1) rotate(5deg);
    }
    50% {
        border-radius: 40% 60% 65% 35% / 75% 45% 55% 25%;
        transform: scale(1.05) rotate(-5deg);
    }
    75% {
        border-radius: 55% 45% 37% 63% / 40% 65% 35% 60%;
        transform: scale(1.15) rotate(3deg);
    }
    100% {
        border-radius: 48% 52% 44% 56% / 55% 35% 65% 45%;
        transform: scale(1.08) rotate(-3deg);
    }
}

	</style>
