<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Carte avec Mascotte</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&display=swap" rel="stylesheet">
  <style>
   body {
  margin: 0;
  padding: 0;
  height: 100vh;
  background-color: #f7efe6;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Sora', sans-serif;
  position: relative;
}


.carte-container {
  position: relative;
  transform: translate(500px, 400px) scale(0.8); /* Réduction proportionnelle */
  transform-origin: bottom right; /* Maintien de la position visuelle */
}

.carte {
  position: relative;
  background-color: #b91939;
  color: white;
  padding: 48px; /* réduit */
  border-radius: 24px;
  max-width: 600px; /* réduit */
  font-size: 20px; /* réduit */
  font-weight: 600;
  line-height: 1.7;
  box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
  overflow: visible;
}

.mascotte {
  position: absolute;
  right: -170px; /* ajusté */
  bottom: -35px;
  width: 240px; /* réduit */
  height: auto;
}
 .region {
        transition: transform 0.3s ease, fill 0.3s ease;
        transform-origin: center;
    }
    
    .region:hover {
        transform: scale(1.75);
        fill: #A72642;
        stroke: none;
        filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&display=swap" rel="stylesheet">
</head>

  <div class="carte-container">
    <div class="carte">

      interactive des traditions<br />
      des régions de France !
